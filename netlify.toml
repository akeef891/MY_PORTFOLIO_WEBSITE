# Netlify: build the Vite app inside MY-PORTFOLIO-WEBSITE
[build]
  base = "MY-PORTFOLIO-WEBSITE"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Relative to base directory (MY-PORTFOLIO-WEBSITE)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Static files (verification, robots, sitemap) are served from dist before SPA fallback.
# public/_redirects mirrors these rules for Netlify publish directory.

[[redirects]]
  from = "/google3629eea469b194fe.html"
  to = "/google3629eea469b194fe.html"
  status = 200
  force = false

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = false

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
